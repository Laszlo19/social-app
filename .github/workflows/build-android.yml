name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile translations
        run: pnpm intl:compile

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create placeholder google-services.json
        run: |
          cat > google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "bluesky-placeholder",
              "storage_bucket": "bluesky-placeholder.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "xyz.blueskyweb.app.dev"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  { "current_key": "AIzaSyPLACEHOLDER0PLACEHOLDER0PLACEHOLDER00" }
                ],
                "services": {
                  "appinvite_service": { "other_platform_oauth_client": [] }
                }
              }
            ],
            "configuration_version": "1"
          }
          JSON

      - name: Generate native Android project
        run: pnpm exec expo prebuild --platform android --clean
        env:
          EXPO_PUBLIC_ENV: development
          EXPO_PUBLIC_SIDELOAD: 'true'

      - name: Point alternate icon aliases at adaptive resources
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          # Repoint each alternate icon activity-alias (default_*/core_*) at the
          # adaptive-icon XML generated by the withAndroidAdaptiveAltIcons
          # plugin, so the launcher masks them. ic_launcher is left untouched.
          sed -i -E \
            -e 's#(android:roundIcon=")@mipmap/((default|core)_[a-z_]+)"#\1@mipmap/ic_adaptive_\2"#g' \
            -e 's#(android:icon=")@mipmap/((default|core)_[a-z_]+)"#\1@mipmap/ic_adaptive_\2"#g' \
            "$MANIFEST"
          echo "--- alias icon refs after rewrite ---"
          grep -nE 'android:icon="@mipmap/(default|core)|ic_adaptive' "$MANIFEST" | head -40

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Rename APK for release
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk \
            "dist/bluesky-dev-1.124.0-build${{ github.run_number }}.apk"

      - name: Publish APK to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-dev-build${{ github.run_number }}
          name: Bluesky Dev 1.124.0 (build ${{ github.run_number }})
          prerelease: true
          files: dist/bluesky-dev-1.124.0-build${{ github.run_number }}.apk
          body: |
            Sideload-ready **Bluesky Dev** APK (applicationId `xyz.blueskyweb.app.dev`,
            installs alongside the official app).

            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref_name }}

            Download the `.apk` below and sideload it (e.g. drag onto a Nox emulator).
